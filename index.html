
<!DOCTYPE html>
<html lang="fr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="shortcut icon" href="https://data.bycn.fr/Asgard/Src/Icons/DigiChantier.ico" type="image/x-icon">
 <title>Détail du Chantier</title>
 <script src="https://data.bycn.fr/Asgard/Src/JS/tailwindcss.js"></script>
 <script src="https://data.bycn.fr/Asgard/Src/JS/crypto-js.min.js"></script>
 <style>
  /* Correction pour les micro-espaces entre les morceaux de puzzle */
  .puzzle-piece {
   width: 100.5%;
   height: auto;
   display: block;
   margin: 0;
   padding: 0;
  }
  /* Empêche la sélection du texte pour simuler une image */
  body {
   -webkit-user-select: none;
   user-select: none;
  }
 </style>
</head>
<body class="bg-white min-h-screen flex items-start justify-center p-4 antialiased text-slate-800">

 <div id="loader" class="mt-20 text-slate-400 font-medium animate-pulse">
  Chargement sécurisé...
 </div>

 <div id="content" class="hidden w-full max-w-md bg-white overflow-hidden">



  <div class="space-y-6 px-2">

   <div class="border-b border-slate-100 pb-3">
    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1">Référence Projet</p>
    <h1 id="val-id" class="text-lg font-semibold text-slate-900"></h1>
   </div>

   <div>
    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1">Nom du Chantier</p>
    <p id="val-nom" class="text-base font-medium leading-tight"></p>
   </div>

   <div>
    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1">Localisation</p>
    <p id="val-adresse" class="text-sm text-slate-600"></p>
   </div>

   <div>
    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1">Description</p>
    <p id="val-desc" class="text-sm text-slate-600 leading-relaxed italic"></p>
   </div>

   <div class="pt-4">
    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-3 text-center">Vue du site</p>
    <div id="puzzle-container" class="grid grid-cols-4 gap-0 w-3/4 mx-auto overflow-hidden bg-white leading-[0]">
    </div>
   </div>

   <div class="pt-8 pb-4 text-center">
    <p id="val-date" class="text-[9px] text-slate-400 font-mono"></p>
   </div>
  </div>
 </div>

 <script>



  async function chargerChantier() {
   const _s = [67, 53, 65, 53, 49, 53, 57, 48, 55, 48, 65, 56, 52, 50, 50, 65, 66, 68, 69, 66, 54, 57, 51, 57, 68, 67, 48, 65, 66, 57, 68, 54];
   var _m = "";
   const params = new URLSearchParams(window.location.search);
   const hashParam = window.location.hash.substring(1);
   var id = ""; // Récupère le nom du fichier (ex: PRJ-782)
   var salt = ""; // Le sel après le #

   for (let i = 0; i < _s.length; i++) {
    _m += String.fromCharCode(_s[i]);
   }

   for (let i = 0; i < 6; i++) {
    id += hashParam.substring(i * 2, i * 2 + 1);
   }
   for (let i = 0; i < 16; i++) {
    salt += hashParam.substring(i * 2 + 1, i * 2 + 2);
   }

   if (!id || !salt) {
    document.getElementById('loader').innerHTML = "Lien invalide.";
    return;
   }

   try {
    const response = await fetch(`https://data.bycn.fr/Data/${id}.json`);
    if (!response.ok) throw new Error("Fichier introuvable.");
    const encryptedData = await response.text();

    const fullKey = _m + salt;


    const key = CryptoJS.MD5(fullKey);
    const iv = CryptoJS.MD5(fullKey + "iv");

    const decrypted = CryptoJS.AES.decrypt(encryptedData, key, {
     iv: iv,
     mode: CryptoJS.mode.CBC,
     padding: CryptoJS.pad.Pkcs7
    });
    
    const decryptedText = decrypted.toString(CryptoJS.enc.Utf8);
    if (!decryptedText) throw new Error("Erreur de clé.");

    const chantier = JSON.parse(decryptedText);

    // Remplissage des données
    //document.getElementById('val-id').textContent = chantier.IdProject;
    document.getElementById('val-nom').textContent = chantier.NameProject;
    document.getElementById('val-adresse').textContent = chantier.Address;
    document.getElementById('val-desc').textContent = chantier.CommentProject;
    document.getElementById('val-date').innerText = "Mis à jour le " + chantier.DateMiseAJour;

    // Reconstruction Puzzle
    const container = document.getElementById('puzzle-container');
    chantier.MorceauxPhotos.forEach(imgName => {
     const img = document.createElement('img');
     img.src = `https://data.bycn.fr/Images/${imgName}`;
     img.className = 'puzzle-piece';
     container.appendChild(img);
    });

    document.getElementById('loader').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');

   } catch (err) {
    document.getElementById('loader').innerText = "Erreur de chargement.";
   }
  }
  chargerChantier();
 </script>
</body>
</html>
