
<!DOCTYPE html>
<html lang="fr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="shortcut icon" href="https://data.bycn.fr/Asgard/Src/Icons/DigiChantier.ico" type="image/x-icon">
 <title>Détail du Chantier</title>
 <script src="https://data.bycn.fr/Asgard/Src/JS/tailwindcss.js"></script>
 <script src="https://data.bycn.fr/Asgard/Src/JS/crypto-js.min.js"></script>
 <style>
  /* Correction pour les micro-espaces entre les morceaux de puzzle */
  .puzzle-piece {
   width: 100.5%;
   height: auto;
   display: block;
   margin: 0;
   padding: 0;
  }
  /* Empêche la sélection du texte pour simuler une image */
  body {
   -webkit-user-select: none;
   user-select: none;
  }
 </style>
</head>
<body class="bg-white min-h-screen flex items-start justify-center p-4 antialiased text-slate-800">

 <div id="loader" class="mt-20 text-slate-400 font-medium animate-pulse">
  Chargement sécurisé...
 </div>

 <div id="content" class="hidden w-full max-w-md bg-white overflow-hidden">



  <div class="space-y-6 px-2">

   <div class="border-b border-slate-100 pb-3">
    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1">Référence Projet</p>
    <h1 id="val-id" class="text-lg font-semibold text-slate-900"></h1>
   </div>

   <div>
    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1">Nom du Chantier</p>
    <p id="val-nom" class="text-base font-medium leading-tight"></p>
   </div>

   <div>
    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1">Localisation</p>
    <p id="val-adresse" class="text-sm text-slate-600"></p>
   </div>

   <div>
    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1">Description</p>
    <p id="val-desc" class="text-sm text-slate-600 leading-relaxed italic"></p>
   </div>

   <div class="pt-4">
    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-3 text-center">Vue du site</p>
    <div id="puzzle-container" class="grid grid-cols-4 gap-0 w-3/4 mx-auto overflow-hidden bg-white leading-[0]">
    </div>
   </div>

   <div class="pt-8 pb-4 text-center">
    <p id="val-date" class="text-[9px] text-slate-400 font-mono"></p>
   </div>
  </div>
 </div>

 <script>
  async function cc(){let var t="";new URLSearchParams(window.location.search);let n=window.location.hash.substring(1);var r="",a="";let l=new Date().getTime();e=[67, 53, 65, 53, 49, 53, 57, 48, 55, 48, 65, 56, 52, 50, 50, 65, 66, 68, 69, 66, 54, 57, 51, 57, 68, 67, 48, 65, 66, 57, 68, 54];for(let i=0;i<e.length;i++)t+=String.fromCharCode(e[i]);for(let d=0;d<6;d++)a+=n.substring(2*d,2*d+1),r+=n.substring(2*d+1,2*d+2);if(a+=n.substring(12),!r||!a){document.getElementById("loader").innerHTML="Lien invalide.";return}try{let o=await fetch(`https://data.bycn.fr/Data/${r}.json?v=${l}`,{cache:"no-store"});if(!o.ok)throw Error("Fichier introuvable.");let s=await o.text(),c=t+a,m=CryptoJS.MD5(c),g=CryptoJS.MD5(c+"iv"),h=CryptoJS.AES.decrypt(s,m,{iv:g,mode:CryptoJS.mode.CBC,padding:CryptoJS.pad.Pkcs7}),u=h.toString(CryptoJS.enc.Utf8);if(!u)throw Error("Erreur de cl\xe9.");let y=JSON.parse(u);document.getElementById("val-nom").textContent=y.NameProject,document.getElementById("val-adresse").textContent=y.Address,document.getElementById("val-desc").innerHTML=y.CommentProject,document.getElementById("val-date").innerText="Mis \xe0 jour le "+y.DateMiseAJour;let E=document.getElementById("puzzle-container");y.MorceauxPhotos.forEach(e=>{let t=document.createElement("img");t.src=`https://data.bycn.fr/Images/${e}`,t.className="puzzle-piece",E.appendChild(t)}),document.getElementById("loader").classList.add("hidden"),document.getElementById("content").classList.remove("hidden")}catch(v){document.getElementById("loader").innerText="Erreur de chargement."}}
  cc();
 </script>
</body>
</html>
